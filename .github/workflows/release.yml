name: Release Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (defaults to current ref)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout connector
        uses: actions/checkout@v4
        with:
          path: connector

      - name: Checkout framework (companion repo)
        uses: actions/checkout@v4
        with:
          repository: mlimarenko/IronRAG.ConnectorTemplate
          ref: v0.0.3
          path: framework

      - name: Stage framework into connector context
        run: |
          mv framework connector/framework
          ls connector/framework

      - name: Resolve version tag
        id: version
        working-directory: connector
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF##*/}"
          fi
          tag="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: connector
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            pipingspace/ironrag.gitrepos:latest
            pipingspace/ironrag.gitrepos:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
